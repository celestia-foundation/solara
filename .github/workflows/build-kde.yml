name: Build Solara ISO — KDE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: CPU Info
        run: lscpu | grep -E "Model name|CPU\(s\)|Thread|Core"

      - name: Runner Info
        run: |
          echo "=== Solara Build: KDE ==="
          echo "Runner OS: $(uname -r)"
          echo "Disk space: $(df -h / | tail -1)"
          echo "RAM: $(free -h | grep Mem)"
          echo "Build date: $(date -u)"

      - name: Cache pacman packages
        uses: actions/cache@v4
        with:
          path: /tmp/pkg-cache
          key: pacman-kde-${{ hashFiles('Dockerfile', 'releng/packages.x86_64', 'installer/Cargo.lock') }}
          restore-keys: |
            pacman-kde-
            pacman-

      - name: Build ISO via docker compose
        run: |
          mkdir -p /tmp/pkg-cache /tmp/iso-out
          mkdir -p out
          # Bind compose's named volumes to the cache dirs the workflow already uses.
          docker compose build
          docker run --privileged --rm \
            -v ${{ github.workspace }}:/solara \
            -v /tmp/iso-out:/iso-out \
            -v /tmp/pkg-cache:/var/cache/pacman/pkg \
            -e FLAVOR=kde \
            solara-build:latest
          # The entrypoint already renames to *-kde.iso.
          mv /tmp/iso-out/*-kde.iso /tmp/iso-out/ 2>/dev/null || true
          echo "Built: $(ls /tmp/iso-out/*.iso)"

      - name: Upload ISO to GitLab
        run: |
          ISO_FILE=$(ls /tmp/iso-out/*-kde.iso | head -1)
          ISO_NAME=$(basename "$ISO_FILE")
          VERSION=$(date +%Y.%m.%d)
          ISO_SIZE=$(du -sh "$ISO_FILE" | cut -f1)
          BUILD_DATE=$(date "+%Y-%m-%d %H:%M UTC")

          # Get changelog from GitHub commits
          CHANGES=$(git log --format="- %s" -15 HEAD)

          echo "Uploading ${ISO_NAME} (${ISO_SIZE})..."
          curl --fail --request PUT \
            --header "PRIVATE-TOKEN: ${{ secrets.GL_TOKEN }}" \
            --upload-file "$ISO_FILE" \
            "https://gitlab.com/api/v4/projects/${{ secrets.GL_PROJECT_ID }}/packages/generic/solara-kde/${VERSION}/${ISO_NAME}"

          DOWNLOAD_URL="https://gitlab.com/api/v4/projects/${{ secrets.GL_PROJECT_ID }}/packages/generic/solara-kde/${VERSION}/${ISO_NAME}"

          echo "Cleaning up old release..."
          curl -s --request DELETE \
            --header "PRIVATE-TOKEN: ${{ secrets.GL_TOKEN }}" \
            "https://gitlab.com/api/v4/projects/${{ secrets.GL_PROJECT_ID }}/releases/latest-kde" || true
          curl -s --request DELETE \
            --header "PRIVATE-TOKEN: ${{ secrets.GL_TOKEN }}" \
            "https://gitlab.com/api/v4/projects/${{ secrets.GL_PROJECT_ID }}/repository/tags/latest-kde" || true
          sleep 3

          curl -s --request POST \
            --header "PRIVATE-TOKEN: ${{ secrets.GL_TOKEN }}" \
            --header "Content-Type: application/json" \
            --data "{\"tag_name\": \"latest-kde\", \"ref\": \"main\"}" \
            "https://gitlab.com/api/v4/projects/${{ secrets.GL_PROJECT_ID }}/repository/tags"

          DESCRIPTION="## Solara Linux — KDE Edition\n\nKDE Plasma — the primary Solara flavor. Full Plasma desktop.\n\n---\n\n### Changes\n\n${CHANGES}\n\n---\n\n### Build Info\n\n| Field | Value |\n|-------|-------|\n| Build Date | ${BUILD_DATE} |\n| Variant | kde |\n| ISO Size | ${ISO_SIZE} |\n| Base | Arch Linux (rolling) |\n| Init | systemd |\n| Architecture | x86_64 |\n| Runner | GitHub Actions |\n\n### Download\n\n**[⬇ Download ISO](${DOWNLOAD_URL})**\n\n### Write to USB\n\n\`\`\`bash\ndd if=${ISO_NAME} of=/dev/sdX bs=4M status=progress\n\`\`\`\n\n---\nBuilt automatically via GitHub Actions | [Source](https://github.com/celestiafoundation/solara)"

          curl -s --request POST \
            --header "PRIVATE-TOKEN: ${{ secrets.GL_TOKEN }}" \
            --header "Content-Type: application/json" \
            --data "{\"name\": \"Solara Linux ${VERSION} — KDE\", \"tag_name\": \"latest-kde\", \"description\": \"${DESCRIPTION}\", \"assets\": {\"links\": [{\"name\": \"ISO Download\", \"url\": \"${DOWNLOAD_URL}\", \"link_type\": \"package\"}]}}" \
            "https://gitlab.com/api/v4/projects/${{ secrets.GL_PROJECT_ID }}/releases"

          echo "Done! ISO at: $DOWNLOAD_URL"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: solara-kde-iso
          path: /tmp/iso-out/*.iso
          retention-days: 90

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-kde
          path: /tmp/archiso-work/
          retention-days: 7
