name: Build Solara ISO — PANTHEON

on:
  push:
    branches: [main]
    paths:
      - 'releng/packages.pantheon'
      - 'releng/airootfs/**'
      - 'releng/pacman.conf'
      - 'releng/profiledef.sh'
      - '.github/workflows/build-pantheon.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: CPU Info
        run: lscpu | grep -E "Model name|CPU\(s\)|Thread|Core"

      - name: Runner Info
        run: |
          echo "=== Solara Build: PANTHEON ==="
          echo "Runner OS: $(uname -r)"
          echo "Disk space: $(df -h / | tail -1)"
          echo "RAM: $(free -h | grep Mem)"
          echo "Build date: $(date -u)"

      - name: Cache pacman packages
        uses: actions/cache@v4
        with:
          path: /tmp/pkg-cache
          key: pacman-pantheon-${{ hashFiles('releng/packages.pantheon') }}
          restore-keys: |
            pacman-pantheon-
            pacman-

      - name: Build ISO
        run: |
          mkdir -p /tmp/pkg-cache /tmp/iso-out
          docker run --privileged --rm \
            -v ${{ github.workspace }}:/solara \
            -v /tmp/iso-out:/iso-out \
            -v /tmp/pkg-cache:/var/cache/pacman/pkg \
            ghcr.io/archlinux/archlinux:latest \
            bash -c "
              pacman -Sy --noconfirm archiso &&
              mkdir -p /tmp/archiso-work &&
              cp /solara/releng/packages.pantheon /solara/releng/packages.x86_64.active && cp /solara/releng/packages.x86_64.active /solara/releng/packages.x86_64 &&
              mkarchiso -v -w /tmp/archiso-work -o /iso-out /solara/releng/
            "
          ISO_FILE=$(ls /tmp/iso-out/*.iso | head -1)
          ISO_BASE=$(basename "$ISO_FILE" .iso)
          mv "$ISO_FILE" "/tmp/iso-out/${ISO_BASE}-pantheon.iso"
          echo "Built: $(ls /tmp/iso-out/*.iso)"

      - name: Upload ISO to GitLab
        run: |
          ISO_FILE=$(ls /tmp/iso-out/*-pantheon.iso | head -1)
          ISO_NAME=$(basename "$ISO_FILE")
          VERSION=$(date +%Y.%m.%d)
          ISO_SIZE=$(du -sh "$ISO_FILE" | cut -f1)
          BUILD_DATE=$(date "+%Y-%m-%d %H:%M UTC")

          # Get changelog from last 15 commits
          CHANGES=$(git log --format="- %s" -15 HEAD 2>/dev/null)
          if [ -z "$CHANGES" ]; then
            CHANGES="- Build updates"
          fi

          echo "Uploading ${ISO_NAME} (${ISO_SIZE})..."
          curl --fail --request PUT \
            --header "PRIVATE-TOKEN: ${{ secrets.GL_TOKEN }}" \
            --upload-file "$ISO_FILE" \
            "https://gitlab.com/api/v4/projects/${{ secrets.GL_PROJECT_ID }}/packages/generic/solara-pantheon/${VERSION}/${ISO_NAME}"

          DOWNLOAD_URL="https://gitlab.com/api/v4/projects/${{ secrets.GL_PROJECT_ID }}/packages/generic/solara-pantheon/${VERSION}/${ISO_NAME}"

          echo "Cleaning up old release..."
          curl -s --request DELETE \
            --header "PRIVATE-TOKEN: ${{ secrets.GL_TOKEN }}" \
            "https://gitlab.com/api/v4/projects/${{ secrets.GL_PROJECT_ID }}/releases/latest-pantheon" || true
          curl -s --request DELETE \
            --header "PRIVATE-TOKEN: ${{ secrets.GL_TOKEN }}" \
            "https://gitlab.com/api/v4/projects/${{ secrets.GL_PROJECT_ID }}/repository/tags/latest-pantheon" || true
          sleep 3

          curl -s --request POST \
            --header "PRIVATE-TOKEN: ${{ secrets.GL_TOKEN }}" \
            --header "Content-Type: application/json" \
            --data "{\"tag_name\": \"latest-pantheon\", \"ref\": \"main\"}" \
            "https://gitlab.com/api/v4/projects/${{ secrets.GL_PROJECT_ID }}/repository/tags"

          DESCRIPTION="## Solara Linux — PANTHEON Edition\n\nPantheon — Elementary OS's DE. Beautiful and clean.\n\n---\n\n### Changes\n\n${CHANGES}\n\n---\n\n### Build Info\n\n| Field | Value |\n|-------|-------|\n| Build Date | ${BUILD_DATE} |\n| Variant | pantheon |\n| ISO Size | ${ISO_SIZE} |\n| Base | Arch Linux (rolling) |\n| Init | systemd |\n| Architecture | x86_64 |\n| Runner | GitHub Actions |\n\n### Download\n\n**[⬇ Download ISO](${DOWNLOAD_URL})**\n\n### Write to USB\n\n\`\`\`bash\ndd if=${ISO_NAME} of=/dev/sdX bs=4M status=progress\n\`\`\`\n\n---\nBuilt automatically via GitHub Actions | [Source](https://github.com/ravecorelabs/solara)"

          curl -s --request POST \
            --header "PRIVATE-TOKEN: ${{ secrets.GL_TOKEN }}" \
            --header "Content-Type: application/json" \
            --data "{\"name\": \"Solara Linux ${VERSION} — PANTHEON\", \"tag_name\": \"latest-pantheon\", \"description\": \"${DESCRIPTION}\"}" \
            "https://gitlab.com/api/v4/projects/${{ secrets.GL_PROJECT_ID }}/releases"

          echo "Done! ISO at: $DOWNLOAD_URL"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: solara-pantheon-iso
          path: /tmp/iso-out/*.iso
          retention-days: 90

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-pantheon
          path: /tmp/archiso-work/
          retention-days: 7
