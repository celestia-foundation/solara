name: Build Solara ISO

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: CPU Info
        run: lscpu | grep -E "Model name|CPU\(s\)|Thread|Core"

      - name: Cache pacman packages
        uses: actions/cache@v4
        with:
          path: /tmp/pkg-cache
          key: pacman-${{ hashFiles('releng/packages.x86_64') }}
          restore-keys: |
            pacman-

      - name: Build ISO
        run: |
          mkdir -p /tmp/pkg-cache /tmp/iso-out
          docker run --privileged --rm \
            -v ${{ github.workspace }}:/solara \
            -v /tmp/iso-out:/iso-out \
            -v /tmp/pkg-cache:/var/cache/pacman/pkg \
            ghcr.io/archlinux/archlinux:latest \
            bash -c "
              pacman -Sy --noconfirm archiso &&
              mkdir -p /tmp/archiso-work &&
              mkarchiso -v -w /tmp/archiso-work -o /iso-out /solara/releng/
            "

      - name: Upload ISO to GitLab and create release
        run: |
          ISO_FILE=$(ls /tmp/iso-out/*.iso | head -1)
          ISO_NAME=$(basename "$ISO_FILE")
          VERSION=$(date +%Y.%m.%d)

          echo "Uploading ISO via generic packages API..."
          curl --fail --request PUT \
            --header "PRIVATE-TOKEN: ${{ secrets.GL_TOKEN }}" \
            --upload-file "$ISO_FILE" \
            "https://gitlab.com/api/v4/projects/${{ secrets.GL_PROJECT_ID }}/packages/generic/solara-iso/${VERSION}/${ISO_NAME}"

          DOWNLOAD_URL="https://gitlab.com/api/v4/projects/${{ secrets.GL_PROJECT_ID }}/packages/generic/solara-iso/${VERSION}/${ISO_NAME}"

          echo "Deleting old tag and release..."
          curl -s --request DELETE \
            --header "PRIVATE-TOKEN: ${{ secrets.GL_TOKEN }}" \
            "https://gitlab.com/api/v4/projects/${{ secrets.GL_PROJECT_ID }}/releases/latest" || true
          curl -s --request DELETE \
            --header "PRIVATE-TOKEN: ${{ secrets.GL_TOKEN }}" \
            "https://gitlab.com/api/v4/projects/${{ secrets.GL_PROJECT_ID }}/repository/tags/latest" || true

          echo "Creating tag and release..."
          curl -s --request POST \
            --header "PRIVATE-TOKEN: ${{ secrets.GL_TOKEN }}" \
            --header "Content-Type: application/json" \
            --data "{\"tag_name\": \"latest\", \"ref\": \"main\"}" \
            "https://gitlab.com/api/v4/projects/${{ secrets.GL_PROJECT_ID }}/repository/tags"

          curl -s --request POST \
            --header "PRIVATE-TOKEN: ${{ secrets.GL_TOKEN }}" \
            --header "Content-Type: application/json" \
            --data "{\"name\": \"Solara Linux ${VERSION}\", \"tag_name\": \"latest\", \"description\": \"## Solara Linux\\n\\nArch-based. Rolling. No atomic nonsense.\\n\\n**[Download ISO](${DOWNLOAD_URL})**\\n\\nBuilt via GitHub Actions.\"}" \
            "https://gitlab.com/api/v4/projects/${{ secrets.GL_PROJECT_ID }}/releases"

          echo "Done! ISO at: $DOWNLOAD_URL"

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: solara-iso
          path: /tmp/iso-out/*.iso
          retention-days: 90

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: /tmp/archiso-work/
          retention-days: 90
