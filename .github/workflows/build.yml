name: Build Solara ISO

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: CPU Info
        run: lscpu | grep -E "Model name|CPU\(s\)|Thread|Core"

      - name: Cache pacman packages
        uses: actions/cache@v4
        with:
          path: /tmp/pkg-cache
          key: pacman-${{ hashFiles('releng/packages.x86_64') }}
          restore-keys: |
            pacman-

      - name: Build ISO
        run: |
          mkdir -p /tmp/pkg-cache /tmp/iso-out
          docker run --privileged --rm \
            -v ${{ github.workspace }}:/solara \
            -v /tmp/iso-out:/iso-out \
            -v /tmp/pkg-cache:/var/cache/pacman/pkg \
            ghcr.io/archlinux/archlinux:latest \
            bash -c "
              pacman -Sy --noconfirm archiso &&
              mkdir -p /tmp/archiso-work &&
              mkarchiso -v -w /tmp/archiso-work -o /iso-out /solara/releng/
            "

      - name: Upload ISO to GitLab and create release
        run: |
          ISO_FILE=$(ls /tmp/iso-out/*.iso | head -1)
          ISO_NAME=$(basename "$ISO_FILE")
          
          # Upload and save response
          RESPONSE=$(curl --request POST \
            --header "PRIVATE-TOKEN: ${{ secrets.GL_TOKEN }}" \
            --form "file=@${ISO_FILE}" \
            "https://gitlab.com/api/v4/projects/${{ secrets.GL_PROJECT_ID }}/uploads")
          
          MARKDOWN=$(echo "$RESPONSE" | jq -r '.markdown')
          
          # Create release with download link
          curl --request POST \
            --header "PRIVATE-TOKEN: ${{ secrets.GL_TOKEN }}" \
            --header "Content-Type: application/json" \
            --data "{\"name\": \"Solara Linux $(date +%Y-%m-%d)\", \"tag_name\": \"latest\", \"description\": \"**Download:** $MARKDOWN\\n\\n---\\n\\nBuilt via GitHub Actions\", \"released_at\": \"$(date -Iseconds)\"}" \
            "https://gitlab.com/api/v4/projects/${{ secrets.GL_PROJECT_ID }}/releases"

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: solara-iso
          path: /tmp/iso-out/*.iso
          retention-days: 90

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: /tmp/archiso-work/
          retention-days: 90
