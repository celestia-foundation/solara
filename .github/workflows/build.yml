name: Build Solara ISO

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Arch Linux keyring and archiso via Docker
        run: |
          docker run --privileged --rm \
            -v ${{ github.workspace }}:/solara \
            -v /tmp/iso-out:/iso-out \
            ghcr.io/archlinux/archlinux:latest \
            bash -c "
              pacman -Sy --noconfirm archiso &&
              mkdir -p /tmp/archiso-work /iso-out &&
              mkarchiso -v -w /tmp/archiso-work -o /iso-out /solara/releng/
            "

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: solara-iso
          path: /tmp/iso-out/*.iso
          retention-days: 30

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: /tmp/archiso-work/
          retention-days: 7
